; TrikiEmu — firmware emulatora kapsla Triki (BLE peripheral) na ESP32.
; Projekt jest PRZENOSNY: rdzen dziala na dowolnym ESP32 (Arduino + NimBLE).
; M5StickC Plus2 (ekran/przyciski/IMU/bateria) to opcja wlaczana flaga -D HAS_M5.

[platformio]
default_envs = m5stickc_plus2

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
lib_deps =
    h2zero/NimBLE-Arduino @ ^1.4.2

; --- Goly ESP32 (np. ESP32 DevKit). Sterowanie WYLACZNIE z PC po USB-serial:
;     M,gx,gy,gz,ax,ay,az | R | BLE,1 | BLE,0. Startuje z reklama ON. ---
[env:esp32dev]
board = esp32dev

; --- M5StickC Plus2 (ESP32-PICO-V3-02). Dodaje ekran/przyciski/IMU/bateria. ---
; Brak dedykowanego boardu Plus2 — bazujemy na m5stick-c (4 MB; 8 MB nieuzywane).
; NIE wymuszamy 8 MB/partycji — niezgodnosc z 4 MB bootloaderem = petla resetow.
[env:m5stickc_plus2]
board = m5stick-c
build_flags = -D HAS_M5
lib_deps =
    ${env.lib_deps}
    m5stack/M5Unified @ ^0.1.16
